services:

  backend:
    build: .
    container_name: luftborn_songplayer
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PG_NAME}
      SPRING_DATASOURCE_USERNAME: ${PG_USER}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SECURITY_JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECURITY_JWT_ISSUER: ${JWT_ISSUER}
      SECURITY_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      SECURITY_JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: songplayer_postgres
    restart: always
    environment:
      POSTGRES_DB: ${PG_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - songplayer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    container_name: songplayer_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - songplayer_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  songplayer_postgres_data:
  songplayer_redis_data: